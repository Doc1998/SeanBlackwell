<header class="site-header">
  <div class="header-container">
    <!-- Logo -->
    <a href="/" class="logo">
      <img src="/assets/images/logo-sean-small.webp" alt="Your Wedding Photography" class="logo-image">
    </a>

    <!-- Navigation Toggle (Mobile) -->
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Navigation -->
    <nav class="site-nav" id="siteNav">
      <ul class="nav-list">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/about/" class="nav-link">About</a></li>
        <li><a href="/wedding-photography/" class="nav-link">Weddings</a></li>
        <li><a href="/gallery/" class="nav-link">Gallery</a></li>
        <li><a href="/contact/" class="nav-link">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>

<style>
  :root {
    --color-dark: #1a1a1a;
    --color-light: #f9f8f6;
    --color-accent: #c9a961;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .site-header {
    background-color: var(--color-light);
    border-bottom: 1px solid rgba(26, 26, 26, 0.08);
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(12px);
    background-color: rgba(249, 248, 246, 0.95);
  }

  .header-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    flex-shrink: 0;
    transition: opacity var(--transition);
  }

  .logo:hover {
    opacity: 0.8;
  }

  .logo-image {
    height: 100px;
    width: auto;
    display: block;
  }

  /* Navigation */
  .site-nav {
    flex: 1;
    margin-left: 3rem;
  }

  .nav-list {
    list-style: none;
    display: flex;
    gap: 2.5rem;
    align-items: center;
  }

  .nav-link {
    color: var(--color-dark);
    text-decoration: none;
    font-family: var(--font-body);
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: color var(--transition);
    position: relative;
  }

  .nav-link::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background-color: var(--color-accent);
    transition: width var(--transition);
  }

  .nav-link:hover::after {
    width: 100%;
  }

  /* Mobile Navigation Toggle */
  .nav-toggle {
    display: none;
    flex-direction: column;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    gap: 5px;
  }

  .nav-toggle span {
    width: 24px;
    height: 2px;
    background-color: var(--color-dark);
    border-radius: 1px;
    transition: all var(--transition);
  }

  .nav-toggle[aria-expanded="true"] span:nth-child(1) {
    transform: rotate(45deg) translateY(10px);
  }

  .nav-toggle[aria-expanded="true"] span:nth-child(2) {
    opacity: 0;
  }

  .nav-toggle[aria-expanded="true"] span:nth-child(3) {
    transform: rotate(-45deg) translateY(-10px);
  }

  /* Responsive Design */
  @media (max-width: 768px) {
    .header-container {
      padding: 1rem 1rem;
    }

    .logo-image {
      height: 100px;
    }

    .site-nav {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: rgba(249, 248, 246, 0.98);
      border-bottom: 1px solid rgba(26, 26, 26, 0.08);
      padding: 1.5rem;
      margin-left: 0;
      animation: slideDown 0.3s ease-out;
    }

    .site-nav.active {
      display: block;
    }

    .nav-list {
      flex-direction: column;
      gap: 1rem;
      align-items: flex-start;
    }

    .nav-link::after {
      bottom: -2px;
    }

    .nav-toggle {
      display: flex;
    }
  }

  @media (max-width: 480px) {
    .header-container {
      padding: 0.875rem 1rem;
    }

    .logo-image {
      height: 100px;
    }

    .site-nav {
      padding: 1.25rem;
    }
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

<script>
  // Mobile Navigation Toggle
  const navToggle = document.getElementById('navToggle');
  const siteNav = document.getElementById('siteNav');

  if (navToggle) {
    navToggle.addEventListener('click', () => {
      const isExpanded = navToggle.getAttribute('aria-expanded') === 'true';
      navToggle.setAttribute('aria-expanded', !isExpanded);
      siteNav.classList.toggle('active');
    });

    // Close menu when a link is clicked
    const navLinks = siteNav.querySelectorAll('.nav-link');
    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        navToggle.setAttribute('aria-expanded', 'false');
        siteNav.classList.remove('active');
      });
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.site-header')) {
        navToggle.setAttribute('aria-expanded', 'false');
        siteNav.classList.remove('active');
      }
    });
  }
</script>
